<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMPUS BITE</title>
    <style>
        
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

       
        header {
            background-color: #111;
            padding: 15px 0;
            text-align: center;
        }
        .logo {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        nav ul {
            display: flex;
            justify-content: center;
            gap: 30px;
            list-style-type: none; 
            padding: 0; 
            margin: 0;
        }
        nav a {
            color: aqua;
            text-decoration: none;
            font-weight: bold;
        }

        
        .background {
            background-color: #000;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h4 {
            color: #d12f7a;
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
        }

        
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
            padding: 0 10px;
            box-sizing: border-box;
        }

        
        .card {
            background-color: #4a3b2c; 
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .card img {
            width: 100%;
            max-width: 240px;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
        }
        .card h6 {
            font-size: 1.1rem;
            margin: 15px 0;
            color: #fff;
        }
        .card button {
            background-color: #234;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            max-width: 150px;
        }
        .card button a {
            color: aqua;
            text-decoration: none;
            font-weight: bold;
            display: block;
        }

   
        .categories ul {
            display: flex;
            justify-content: center;
            gap: 20px;
            list-style-type: none;
            padding: 15px;
            background-color: #234;
            margin: 0;
        }
        .categories a {
            color: aqua;
            text-decoration: none;
        }

   
        footer {
            text-align: center;
            padding: 20px;
            background-color: #111;
            color: #888;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo"><b>OUR VISION TO SATISFY YOUR CRAVINGS</b></div>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="#">Services</a></li>
                <li><a href="#">Contact</a></li>
            </ul>
        </nav>    
    </header>
    
    <main class="background">
        <h4>Welcome to CAMPUS BITE</h4>

        <div class="menu-container">
            <div class="card">
                <img src="/storage/emulated/0/Pictures/images (7).jpeg" alt="Kota King">
                <h6>KOTA KING : R35.00</h6>
                <button><a href="https://wa.me/27790155149">Order</a></button>
            </div>
               
            <div class="card">
                <img src="/storage/emulated/0/Pictures/images (6).jpeg" alt="Medium size Kota">
                <h6>Medium size: R25.00</h6>
                <button><a href="#">Order</a></button>
            </div>
        </div>
    </main>

    <aside class="categories">
        <ul class="sidebar-links">
            <li><a href="#">Category 1</a></li>
            <li><a href="#">Category 2</a></li>
            <li><a href="#">Category 3</a></li>
        </ul>
    </aside>

    <footer>
        <p>Campus Bite trademark ™</p>
    </footer>

</body>
</html>
