<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CAMPUS BITE</title>
    <style>
        
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }

       
        header {
            background-color: #111;
            padding: 15px 0;
            text-align: center;
        }
        .logo {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }
        nav ul {
            display: flex;
            justify-content: center;
            gap: 30px;
            list-style-type: none; 
            padding: 0; 
            margin: 0;
        }
        nav a {
            color: aqua;
            text-decoration: none;
            font-weight: bold;
        }

        
        .background {
            background-color: #000;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h4 {
            color: #d12f7a;
            font-size: 1.8rem;
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
        }

        
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 800px;
            justify-content: center;
            padding: 0 10px;
            box-sizing: border-box;
        }

        
        .card {
            background-color: #4a3b2c; 
            border-radius: 8px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .card img {
            width: 100%;
            max-width: 240px;
            height: 200px;
            object-fit: cover;
            border-radius: 4px;
        }
        .card h6 {
            font-size: 1.1rem;
            margin: 15px 0;
            color: #fff;
        }
        .card button {
            background-color: #234;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            width: 100%;
            max-width: 150px;
        }
        .card button a {
            color: aqua;
            text-decoration: none;
            font-weight: bold;
            display: block;
        }

   
        .categories ul {
            display: flex;
            justify-content: center;
            gap: 20px;
            list-style-type: none;
            padding: 15px;
            background-color: #234;
            margin: 0;
        }
        .categories a {
            color: aqua;
            text-decoration: none;
        }

   
        footer {
            text-align: center;
            padding: 20px;
            background-color: #111;
            color: #888;
        }
    </style>
</head>
<body>

   
    
    <main class="background">
        <h4> CAMPUS BITE</h4>

<h1> SERVICES</h1>
<br>
<br>
<br>

</body>
</html>
